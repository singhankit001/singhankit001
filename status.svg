<svg xmlns="http://www.w3.org/2000/svg" width="650" height="220" viewBox="0 0 650 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;display=swap');
      
      .container {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      .bg {
        fill: #020617;
        stroke: #1e293b;
        stroke-width: 1.5;
        rx: 12px;
      }
      
      .text-base {
        font-size: 16px;
        fill: #94a3b8;
      }
      
      .text-highlight {
        fill: #f8fafc;
        font-weight: 600;
      }
      
      .text-blue {
        fill: #38bdf8;
        font-weight: 600;
      }
      
      .item {
        opacity: 1;
      }
      
      .emoji {
        font-size: 20px;
        animation: bounce 2s ease-in-out infinite;
      }
      
      .emoji-1 { animation-delay: 0s; }
      .emoji-2 { animation-delay: 0.5s; }
      .emoji-3 { animation-delay: 1.0s; }
      .emoji-4 { animation-delay: 1.5s; }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
    </style>
  </defs>

  <rect class="bg" width="100%" height="100%" />

  <g class="container">
    <!-- Item 1 -->
    <g class="item item-1" transform="translate(30, 48)">
      <text class="emoji emoji-1" y="0">🚀</text>
      <text class="text-base" x="35" y="-2">Currently building: <tspan class="text-highlight">AI-powered full-stack products</tspan></text>
    </g>

    <!-- Item 2 -->
    <g class="item item-2" transform="translate(30, 93)">
      <text class="emoji emoji-2" y="0">🧠</text>
      <text class="text-base" x="35" y="-2">Exploring: <tspan class="text-highlight">AI/ML, automation, and scalable web systems</tspan></text>
    </g>

    <!-- Item 3 -->
    <g class="item item-3" transform="translate(30, 138)">
      <text class="emoji emoji-3" y="0">💬</text>
      <text class="text-base" x="35" y="-2">Ask me about: <tspan class="text-highlight">React, Node.js, Python, SQL, and AI projects</tspan></text>
    </g>

    <!-- Item 4 -->
    <g class="item item-4" transform="translate(30, 183)">
      <text class="emoji emoji-4" y="0">📫</text>
      <text class="text-base" x="35" y="-2">Reach me at: <tspan class="text-blue">singhankit91624@gmail.com</tspan></text>
    </g>
  </g>
</svg>
